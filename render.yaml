# Free tier: one public URL for UI + Sira + REST (same origin).
# After first deploy, open the service → Environment → add secrets (see DEPLOY.md).
services:
  - type: web
    name: siratest
    runtime: node
    plan: free
    region: oregon
    buildCommand: node scripts/ensure-sira.mjs && npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      # Set these in the Render dashboard (never commit real values):
      - key: SIRA_MASTER_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
